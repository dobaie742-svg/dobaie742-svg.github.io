<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aimlock v1.0 - Cyberpunk Premium Mod Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #030306;
            font-family: 'Rajdhani', sans-serif;
            color: #e0e6ed;
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
            padding: 40px 20px;
        }

        /* Nền không gian kịch tính với khói sáng neon chéo */
        .cyber-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(255, 0, 85, 0.12) 0%, transparent 50%),
                #040509;
            z-index: 1;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            opacity: 0.4;
        }

        .dynamic-glow {
            position: fixed; width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(255, 0, 85, 0.05) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 2;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease-out;
        }

        /* Bảng điều khiển sang trọng pha trộn sợ carbon và kính nhám siêu cứng */
        .cyber-panel {
            background: rgba(8, 9, 15, 0.85);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(0, 240, 255, 0.25);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 850px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.7),
                0 0 40px rgba(0, 240, 255, 0.1),
                inset 0 0 30px rgba(0, 240, 255, 0.03);
            position: relative;
            z-index: 5;
            transform-style: preserve-3d;
            transition: transform 0.15s cubic-bezier(0.2, 0.6, 0.4, 1);
        }

        /* Viền định vị Robot CNC */
        .cyber-panel::before {
            content: ''; position: absolute; top: -2px; left: -2px; width: 30px; height: 30px;
            border-style: solid; border-color: #ff0055 transparent transparent #ff0055; border-width: 4px 0 0 4px;
            filter: drop-shadow(0 0 8px #ff0055);
        }

        .cyber-panel::after {
            content: ''; position: absolute; bottom: -2px; right: -2px; width: 30px; height: 30px;
            border-style: solid; border-color: transparent #00f0ff #00f0ff transparent; border-width: 0 4px 4px 0;
            filter: drop-shadow(0 0 8px #00f0ff);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #fff, #00f0ff, #ff0055);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.5));
            margin-bottom: 35px;
            transform: translateZ(40px);
        }

        /* Bố cục lưới Modules */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            transform: translateZ(20px);
        }

        @media (max-width: 700px) {
            .menu-grid { grid-template-columns: 1fr; }
        }

        /* Thiết kế module tính năng sang trọng và tinh xảo */
        .mod-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00f0ff;
            border-radius: 8px;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        /* Trạng thái Hover Module: Đổi sang viền Đỏ và tăng chiều sâu Neon phát sáng */
        .mod-item:hover {
            background: rgba(0, 240, 255, 0.04);
            border-color: rgba(0, 240, 255, 0.3);
            border-left-color: #ff0055;
            transform: scale(1.03) translateZ(15px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .mod-name {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e2e8f0;
            text-shadow: 0 0 4px rgba(255,255,255,0.1);
            transition: color 0.3s;
        }

        .mod-item:hover .mod-name {
            color: #fff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
        }

        /* Nút công tắc kích hoạt cao cấp có Animation lỏng phát sáng */
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slider::before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: #64748b;
            border-radius: 50%;
            transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Khi Toggle liên kết kích hoạt, chuyển màu mượt mà sang Cyan và Neon phản xạ */
        input:checked + .slider {
            background-color: rgba(0, 240, 255, 0.12);
            border-color: #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4), inset 0 0 8px rgba(0, 240, 255, 0.2);
        }

        input:checked + .slider::before {
            transform: translateX(28px);
            background-color: #00f0ff;
            box-shadow: 0 0 12px #00f0ff, 0 0 4px #fff;
        }

        /* Module chân trang hiển thị trạng thái hệ thống */
        .panel-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transform: translateZ(10px);
        }

        .status-online {
            color: #00ffaa;
            text-shadow: 0 0 8px rgba(0, 255, 170, 0.5);
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="scanlines"></div>
    <div class="dynamic-glow" id="glowPulse"></div>

    <div class="cyber-panel" id="menuPanel">
        <div class="logo">Aimlock v1.0</div>
        
        <div class="menu-grid">
            <div class="mod-item"><span class="mod-name">Aimlock</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">Aim Assist</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">Smooth Aim</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">Head Lock</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">Drag Aim</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">Anti Shake</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">Sensitivity Boost</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">FPS Boost</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">No Recoil</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="mod-item"><span class="mod-name">Anti Ban</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        </div>

        <div class="panel-footer">
            <div>BYPASS CORE: <span class="status-online">ACTIVE 100%</span></div>
            <div>STATUS: <span class="status-online">UNDETECTED</span></div>
        </div>
    </div>

    <script>
        const panel = document.getElementById('menuPanel');
        const glowPulse = document.getElementById('glowPulse');

        // Phối hợp đồng bộ Parallax 3D & Nguồn sáng tự nhiên theo tọa độ chuột
        document.addEventListener('mousemove', (e) => {
            glowPulse.style.left = `${e.clientX}px`;
            glowPulse.style.top = `${e.clientY}px`;

            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            panel.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            panel.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });
    </script>
</body>
</html>
